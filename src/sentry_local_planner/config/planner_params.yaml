sentry_local_planner:
  ros__parameters:
    # --- SDFMap 参数 ---
    manager:
      odometry: "/Odometry"

    sdf_map:
      frame_id: "odom"
      use_global_map: false
      use_cloud_input: true
      cloud_topic: "/cloud_registered"
      cloud_min_height: -0.2        # 包含低于机器人的地面/坡面
      cloud_max_height: 0.8         # 机器人高度以上的悬空障碍
      map_size_x: 30.0              # RMUC 赛场 ~15x28m, 留余量
      map_size_y: 30.0
      resolusion_: 0.05             # 5cm 分辨率 (600x600=360K 格子)
      obstacles_inflation: 0.05     # 仅做地图噪声平滑，车体安全由 footprint 检测负责
      max_slope_deg: 17.0           # 最大可通行坡度 17° (RMUC 赛场 15° + 余量)
      step_height_max: 0.08         # 最大可通行台阶高度 8cm
      local_map_margin: 10
      local_update_range_x: 8.0     # 局部更新范围 8m
      local_update_range_y: 8.0
      show_esdf_time: false
      # Log-odds 贝叶斯占据更新
      logodds_hit: 0.85              # 命中一次增加的 logodds
      logodds_miss: -0.4             # 射线穿过一次减少的 logodds
      logodds_max: 3.5               # 上限 clamp (~97% 占据)
      logodds_min: -2.0              # 下限 clamp (~12% 占据)
      logodds_thresh: 0.0            # 占据阈值: > 此值 → occupied

    # --- Kinodynamic A* 参数 ---
    search:
      max_tau: 0.6
      init_max_tau: 0.8
      max_vel: 3.0                 # 哨兵最大速度 3 m/s
      max_acc: 3.0                 # 麦轮加速度
      w_time: 5.0
      horizon: 15.0                # 搜索范围 15m (赛场对角线)
      resolution_astar: 0.05      # 与 sdf_map 分辨率一致
      time_resolution: 0.8
      lambda_heu: 5.0
      allocate_num: 100000
      check_num: 50
      robot_radius: 0.3            # 车体半径，footprint 碰撞检测用

    # --- 模式选择 ---
    planner_mode: "minco"          # "bspline" | "minco"
    controller_mode: "mpc"         # "pd" | "mpc"

    # --- 轨迹跟踪控制器参数 ---
    controller:
      frequency: 50.0              # 控制频率 50Hz
      kp: 2.0                      # PD 位置误差增益
      lookahead_time: 0.2          # 跟踪前视时间，避免频繁重规划时长期卡在低速起步段
      spin_rate: 0.0               # 无轨迹/开阔区自转角速度；LIO 仿真中默认关闭，避免点云发散
      narrow_passage_dist: 0.5     # ESDF 距离 < 此值时停止自转，切换为航向对齐 (m)
      yaw_align_kp: 1.2            # 窄口/路径航向对齐 P 增益
      max_yaw_rate: 0.8            # 航向跟踪角速度限幅 (rad/s)，过大会让 LIO 点云配准发散
      max_yaw_acc: 1.5             # 航向角加速度限幅 (rad/s^2)，避免 angular.z 阶跃
      follow_path_yaw: true        # 移动时车头跟随轨迹方向；false 时恢复开阔区域自转

    # --- MPC 参数 ---
    mpc:
      horizon: 10                  # 预测步数
      q_pos: 10.0                  # 位置跟踪权重
      q_vel: 1.0                   # 速度跟踪权重
      r_acc: 0.1                   # 控制量 (加速度) 权重

    # --- BSpline 优化参数 ---
    optimization:
      lambda1: 10.0                # 平滑性
      lambda2: 8.0                 # 障碍物距离
      lambda3: 0.0001              # 可行性
      lambda4: 0.05                # 终点约束
      lambda5: -1.0
      lambda6: -1.0
      lambda7: 100.0
      lambda8: -1.0
      dist0: 0.42                  # 安全距离 = inflation + 控制余量
      max_vel: 3.0
      max_acc: 3.0
      max_iteration_num1: 2
      max_iteration_num2: 300
      max_iteration_num3: 200
      max_iteration_num4: 200
      max_iteration_time1: 0.0001
      max_iteration_time2: 0.01
      max_iteration_time3: 0.005
      max_iteration_time4: 0.005
      algorithm1: 11
      algorithm2: 15
      order: 3

    # --- 主动重规划参数 ---
    replan:
      frequency: 2.0              # 主动重规划频率 (Hz)，避免控制器长期停留在新轨迹低速起步段

    # --- MINCO 梯度优化参数 ---
    minco_opt:
      lambda_smooth: 0.1           # 平滑权重 (MINCO 天然平滑，比 bspline 小)
      lambda_col: 8.0              # 碰撞代价权重 (与 bspline 对齐)
      lambda_feas: 0.001           # 动力学可行性惩罚
      robot_radius: 0.3            # 车体半径，用于 footprint 碰撞检测
      dist0: 0.05                  # ESDF 安全阈值：footprint 点距墙小于此值才产生代价（小值，安全由 robot_radius 保证）
      dist0_vel_k: 0.0             # 速度相关裕度：dist0_eff = dist0 + dist0_vel_k*|v|。0=关闭(默认)；高速调参建议 0.05~0.1，会改 MINCO 轨迹行为需仿真验证
      num_samples: 8               # 每段采样点数
      max_iter: 200                # L-BFGS 最大迭代次数
      max_time_ms: 20.0            # 最大优化时间 (ms)

    # --- 脱困恢复参数 ("走不通就换一条路径": reroute 扇 → ESDF 后退 → 原地转) ---
    recovery:
      fan_offsets_deg: [20.0, 40.0, 60.0, 90.0, 120.0, 150.0, 180.0]  # reroute 角度扇(相对目标方位，先小后大)
      fan_radius_scales: [1.0, 0.66, 0.4]   # 候选子目标距离 = 该比例 × 局部范围
      max_astar_attempts: 8                 # 每次失败时 reroute 的 A* 搜索预算(防卡顿)
      candidate_clearance_margin: 0.1       # 候选点 ESDF 须 > robot_radius + 此值才尝试
      backoff_distance: 0.45                # 后退步长 (m)，沿 ESDF 梯度远离障碍
      backoff_max_vel_scale: 0.5            # 后退轨迹限速 = 此比例 × max_vel
      backoff_cooldown_cycles: 2            # 两次后退之间至少间隔的 replan 拍数
      rotate_enable: true                   # 无法后退时是否原地转向重新对准目标
      rotate_yaw_rate: 0.6                  # 原地转角速度 (rad/s)
      rotate_max_time: 1.5                  # 原地转最长时间 (s) 后重试 reroute
      global_cycle_cap: 5                   # 非改善型恢复循环上限，超出进入 SAFE_IDLE 保持(有进展的后退会重置)
