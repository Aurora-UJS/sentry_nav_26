sentry_local_planner:
  ros__parameters:
    # --- SDFMap 参数 ---
    manager:
      odometry: "/Odometry"

    sdf_map:
      frame_id: "odom"
      use_global_map: false
      use_cloud_input: true
      cloud_topic: "/cloud_registered"
      cloud_min_height: -0.2        # 包含低于机器人的地面/坡面
      cloud_max_height: 0.8         # 机器人高度以上的悬空障碍
      map_size_x: 30.0              # RMUC 赛场 ~15x28m, 留余量
      map_size_y: 30.0
      resolusion_: 0.05             # 5cm 分辨率 (600x600=360K 格子)
      obstacles_inflation: 0.05     # 仅做地图噪声平滑，车体安全由 footprint 检测负责
      max_slope_deg: 17.0           # 最大可通行坡度 17° (RMUC 赛场 15° + 余量)
      step_height_max: 0.08         # 最大可通行台阶高度 8cm
      local_map_margin: 10
      local_update_range_x: 8.0     # 局部更新范围 8m
      local_update_range_y: 8.0
      show_esdf_time: false
      # Log-odds 贝叶斯占据更新
      logodds_hit: 0.85              # 命中一次增加的 logodds
      logodds_miss: -0.4             # 射线穿过一次减少的 logodds
      logodds_max: 3.5               # 上限 clamp (~97% 占据)
      logodds_min: -2.0              # 下限 clamp (~12% 占据)
      logodds_thresh: 0.0            # 占据阈值: > 此值 → occupied
      occ_timeout: 3.5               # 占据超时 (s): 超时未再命中的格子视为空闲，清自转幽灵障碍；<=0 关闭

    # --- Kinodynamic A* 参数 ---
    search:
      max_tau: 0.6
      init_max_tau: 0.8
      max_vel: 3.0                 # 哨兵最大速度 3 m/s
      max_acc: 3.0                 # 麦轮加速度
      w_time: 5.0
      horizon: 15.0                # 搜索范围 15m (赛场对角线)
      resolution_astar: 0.05      # 与 sdf_map 分辨率一致
      time_resolution: 0.8
      lambda_heu: 5.0
      allocate_num: 100000
      check_num: 50
      robot_radius: 0.3            # 车体半径，footprint 碰撞检测用

    # --- 模式选择 ---
    planner_mode: "minco"          # "bspline" | "minco"
    controller_mode: "mpc"         # "pd" | "mpc"

    # --- 轨迹跟踪控制器参数 ---
    controller:
      frequency: 50.0              # 控制频率 50Hz
      kp: 2.0                      # PD 位置误差增益
      spin_rate: 3.0               # 自转角速度 (rad/s)，改善 LiDAR 覆盖
      # cmd_frame=world: 输出 odom 系速度到 /cmd_vel_world，由 chassis_cmd_node
      # （真车=电控 MCU）用高频陀螺 yaw 旋转到机体系。诊断实测：自转 3 rad/s 下
      # LIO yaw 有 ~50-70ms 龄期 (12~21° 误差)，在 50Hz 侧用它旋转会引入方向偏差。
      cmd_frame: "world"           # "world" | "body"(旧行为，直接发 /cmd_vel)
      narrow_passage_dist: 0.5     # ESDF 距离 < 此值时停止自转，切换为航向对齐 (m)
      yaw_align_kp: 3.0            # 窄口航向对齐 P 增益

    # --- MPC 参数 ---
    mpc:
      horizon: 10                  # 预测步数
      q_pos: 10.0                  # 位置跟踪权重
      q_vel: 1.0                   # 速度跟踪权重
      r_acc: 0.1                   # 控制量 (加速度) 权重

    # --- BSpline 优化参数 ---
    optimization:
      lambda1: 10.0                # 平滑性
      lambda2: 8.0                 # 障碍物距离
      lambda3: 0.0001              # 可行性
      lambda4: 0.05                # 终点约束
      lambda5: -1.0
      lambda6: -1.0
      lambda7: 100.0
      lambda8: -1.0
      dist0: 0.42                  # 安全距离 = inflation + 控制余量
      max_vel: 3.0
      max_acc: 3.0
      max_iteration_num1: 2
      max_iteration_num2: 300
      max_iteration_num3: 200
      max_iteration_num4: 200
      max_iteration_time1: 0.0001
      max_iteration_time2: 0.01
      max_iteration_time3: 0.005
      max_iteration_time4: 0.005
      algorithm1: 11
      algorithm2: 15
      order: 3

    # --- 主动重规划参数 ---
    replan:
      frequency: 10.0             # 主动重规划频率 (Hz)，始终保持轨迹最优

    # --- 执行中轨迹安全监控 (50Hz 控制回路内) ---
    # 阈值必须低于规划器的验收标准 (MINCO footprint esdf>=dist0，贴墙时中心
    # esdf 合法低到 ~0.28m)，否则监控把规划器的正常输出判为不安全 → 振荡。
    safety:
      check_horizon: 2.0          # 前瞻窗口 (s)，覆盖 ~20 个重规划周期
      check_dt: 0.03              # 采样步长 (s)；max_vel*dt ≈ 0.09m ≲ 2 voxel，防穿墙漏检
      margin_warn: 0.20           # 软阈值：低于它 → SLOWDOWN (比有意贴墙更近才报)
      margin_hard: 0.15           # 硬阈值：轨迹真穿障 (~3 voxel)；迫近才 BRAKE
      exit_hysteresis: 0.05       # 退出 SLOWDOWN 需 min esdf >= warn + 此值，防边界抖动
      self_ignore_radius: 0.35    # 距当前位置小于此值的采样点跳过：已占据区域不算未来碰撞，贴墙脱困豁免
      imminent_time: 0.8          # 硬不安全点距今小于此值 → 直接刹停 (3m/s 全减速需 1s/1.5m)
      slowdown_factor: 0.4        # SLOWDOWN 状态线速度缩放
      brake_timeout: 0.5          # 硬不安全持续超时仍未修复 → 刹停 (s)，覆盖 ~5 个重规划周期

    # --- MINCO 梯度优化参数 ---
    minco_opt:
      lambda_smooth: 0.1           # 平滑权重 (MINCO 天然平滑，比 bspline 小)
      lambda_col: 8.0              # 碰撞代价权重 (与 bspline 对齐)
      lambda_feas: 0.001           # 动力学可行性惩罚
      robot_radius: 0.3            # 车体半径，用于 footprint 碰撞检测
      dist0: 0.05                  # ESDF 安全阈值：footprint 点距墙小于此值才产生代价（小值，安全由 robot_radius 保证）
      num_samples: 8               # 每段采样点数
      max_iter: 200                # L-BFGS 最大迭代次数
      max_time_ms: 20.0            # 最大优化时间 (ms)
